version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: sellmatic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: uche1nna2
      POSTGRES_DB: sellmatic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sellmatic-network

  app:
    build: .
    container_name: sellmatic-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:uche1nna2@postgres:5432/sellmatic
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VERIFY_TOKEN: ${VERIFY_TOKEN}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID}
      WABA_ID: ${WABA_ID}
      PORT: 1999
    ports:
      - "1999:1999"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - sellmatic-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sellmatic-network:
    driver: bridge
